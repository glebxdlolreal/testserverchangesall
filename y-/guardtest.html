    <script id="aj_script">Telegram.WebApp.ready();
function sendResult(result) {
  var queryId = Telegram.WebApp.initDataUnsafe.query_id;
  if (!queryId) {
    alert('No query_id');
    return;
  }
  fetch('/guardtest/api', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'result=' + encodeURIComponent(result) + '&_auth=' + encodeURIComponent(Telegram.WebApp.initData)
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.ok) {
      // Telegram.WebApp.close();
    } else {
      alert('Error: ' + (data.error || 'unknown'));
    }
  }).catch(function(e) {
    alert('Request failed: ' + e);
  });
}
</script>
